name: Build APK
 
on:
  push:
    branches: [ main ]
 
jobs:
  build:
    runs-on: ubuntu-22.04
 
    steps:
    - uses: actions/checkout@v4
 
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
 
    - name: Install system packages
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          build-essential libffi-dev libssl-dev \
          python3-dev autoconf libtool \
          pkg-config cmake \
          libltdl-dev
 
    - name: Set JAVA_HOME to JDK 17
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH
 
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0
        pip install "cython>=0.29,<3.1"
 
    - name: Pre-accept ALL Android SDK licenses via license files
      run: |
        mkdir -p ~/.android
        echo "count=0" > ~/.android/repositories.cfg
        # Принимаем все лицензии заранее через файлы — sdkmanager их читает при старте
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" \
          > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" \
          >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" \
          > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        echo -e "\n33b6937b7bec69b5f4dc1f78f547fa1e6e2fb31e" \
          > ~/.buildozer/android/platform/android-sdk/licenses/android-googletv-license
        echo -e "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d" \
          > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license
 
    - name: Cache buildozer global dir
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-global-${{ hashFiles('buildozer.spec') }}
 
    - name: Build APK
      run: |
        buildozer -v android debug 2>&1
 
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: HealthMate-APK
        path: bin/*.apk
 
